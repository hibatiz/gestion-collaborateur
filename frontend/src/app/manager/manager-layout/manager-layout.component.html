<!-- Manager Layout — Dark / Light Glassmorphism Navbar -->
<div class="manager-layout">
  <nav class="top-nav">

    <!-- Brand -->
    <div class="nav-brand">
      <!-- Inline SVG logo — no external file dependency -->
      <svg class="brand-logo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"
           aria-label="MAO Conseil logo">
        <rect width="36" height="36" rx="8" fill="url(#mgrLogoGrad)"/>
        <text x="18" y="24" font-family="'Inter',sans-serif" font-size="14" font-weight="800"
              fill="white" text-anchor="middle" letter-spacing="-0.5">M</text>
        <defs>
          <linearGradient id="mgrLogoGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#818cf8"/>
            <stop offset="100%" stop-color="#38bdf8"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="brand-text">MAO Conseil &mdash; <strong>Gestion Collaborateurs</strong></span>
    </div>

    <!-- Nav links -->
    <div class="nav-links">
      <a routerLink="/manager/dashboard" routerLinkActive="active">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a routerLink="/manager/collaborateurs" routerLinkActive="active">
        <span class="nav-icon">👥</span> Collaborateurs
      </a>
      <a routerLink="/manager/matrice" routerLinkActive="active">
        <span class="nav-icon">🔗</span> Matrice
      </a>
      <a routerLink="/manager/equipe" routerLinkActive="active">
        <span class="nav-icon">⚡</span> Smart Team
      </a>
    </div>

    <!-- User section -->
    <div class="nav-user">

      <!-- ── Theme toggle button ──────────────────────────────────── -->
      <button
        id="btn-theme-toggle-manager"
        class="btn-theme-toggle"
        (click)="themeService.toggle()"
        [title]="themeService.isDark ? 'Passer en mode clair' : 'Passer en mode sombre'"
        [attr.aria-label]="themeService.isDark ? 'Activer le mode clair' : 'Activer le mode sombre'">
        <!-- Soleil (affiché quand thème = dark) -->
        <svg *ngIf="themeService.isDark"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"   x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78"  x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
        <!-- Lune (affiché quand thème = light) -->
        <svg *ngIf="!themeService.isDark"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <span class="username">{{ username }}</span>
      <button class="btn-logout" (click)="logout()">Déconnexion</button>
    </div>

  </nav>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
